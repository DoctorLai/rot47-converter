name: ROT47 Converter (Build, Lint and Test)

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      # Set up Node.js
      - name: Set up Node.js
        uses: actions/setup-node@v7
        with:
          node-version: "20"
          cache: npm

      # Install dependencies
      - name: Install dependencies
        run: npm ci

      # Verify formatting
      - name: Check formatting
        run: npm run format

      # Lint the source
      - name: Lint
        run: npm run lint

      # Run tests
      - name: Run tests
        run: npm run test
        env:
          CI: true

      # Build the project
      - name: Build the project
        run: npm run build
